spring.application.name=charging-pile
server.port=8080

spring.datasource.driver-class-name=org.sqlite.JDBC
spring.datasource.url=jdbc:sqlite:charging-pile.db

spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema.sql
spring.sql.init.data-locations=classpath:data.sql

mybatis.configuration.map-underscore-to-camel-case=true
mybatis.type-aliases-package=com.bupt.charging.entity
mybatis.type-handlers-package=com.bupt.charging.typehandler

# 调度模式：BASIC(默认/必做) | SINGLE_SHORTEST(8a) | BATCH_SHORTEST(8b 仅演示端点)
# 扩展模式为可选加分，默认 BASIC 保持验收用例行为不变。
charging.scheduling.mode=BASIC
