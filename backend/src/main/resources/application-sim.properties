spring.application.name=charging-pile
server.port=8080

# 验收回放专用：独立数据库，避免污染开发库
spring.datasource.driver-class-name=org.sqlite.JDBC
spring.datasource.url=jdbc:sqlite:charging-pile-sim.db

spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema.sql
spring.sql.init.data-locations=classpath:data.sql

mybatis.configuration.map-underscore-to-camel-case=true
mybatis.type-aliases-package=com.bupt.charging.entity
mybatis.type-handlers-package=com.bupt.charging.typehandler

# 充满离桩轮询间隔（毫秒）。回放时仿真钟每步推进后等待一拍即可被捕获。
app.charging.monitor-interval-ms=200
